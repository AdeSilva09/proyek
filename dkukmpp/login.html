<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - SIM-UMKM</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="login-page">
  <form class="login-card" onsubmit="event.preventDefault(); window.location='dashboard.html';">
    <div class="login-logo">UB</div>
    <h1>SIM-UMKM</h1>
    <div class="sub">Sistem Informasi Monitoring UMKM Binaan</div>

    <div class="form-group">
      <label>Username / Email</label>
      <input type="text" class="form-control" placeholder="admin@umkm.go.id" value="admin@umkm.go.id" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-control" placeholder="••••••••" value="password" required>
    </div>
    <div class="form-group flex justify-between items-center" style="font-size:12.5px;">
      <label style="display:flex;gap:6px;align-items:center;font-weight:400;">
        <input type="checkbox" checked> Ingat saya
      </label>
      <a href="#" style="color:var(--primary);">Lupa password?</a>
    </div>
    <button type="submit" class="btn">Masuk ke Sistem</button>
    <div class="footer-link">&copy; 2026 Dinas Koperasi & UMKM</div>
  </form>
</div>
</body>
</html>
