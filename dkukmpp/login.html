<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Admin - SIM-UMKM</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="login-page">
  <form class="login-card" id="loginForm">
    <div class="login-logo">UB</div>
    <h1>SIM-UMKM</h1>
    <div class="sub">Sistem Informasi Kelola UMKM Binaan</div>

    <div id="loginError" class="alert danger" style="display:none;margin-bottom:14px">
      <span data-ic="alert" class="alert-ic"></span>
      <div id="loginErrorText">Email atau password salah.</div>
    </div>

    <div class="form-group">
      <label>Username / Email</label>
      <input type="text" class="form-control" id="email" placeholder="admin@umkm.go.id" value="admin@umkm.go.id" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-control" id="password" placeholder="••••••••" value="admin123" required>
    </div>
    <div class="form-group flex justify-between items-center" style="font-size:12.5px;">
      <label style="display:flex;gap:6px;align-items:center;font-weight:400;">
        <input type="checkbox" checked> Ingat saya
      </label>
      <a href="#" style="color:var(--primary);" onclick="event.preventDefault();alert('Hubungi admin DKUKMPP untuk reset password.')">Lupa password?</a>
    </div>
    <button type="submit" class="btn">Masuk ke Sistem</button>
    <div class="footer-link" style="margin-top:18px;padding-top:12px;border-top:1px solid var(--gray-100)">
      <strong style="color:var(--gray-700)">Demo kredensial:</strong><br>
      admin@umkm.go.id / admin123
    </div>
    <div class="footer-link">&copy; 2026 Dinas Koperasi &amp; UMKM</div>
  </form>
</div>
<script src="../icons.js"></script>
<script src="../auth.js"></script>
<script>
  // Already logged in? redirect to dashboard
  const s = window.SIMAuth && window.SIMAuth.getSession();
  if (s && s.role === 'admin') location.replace('dashboard.html');

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const pw = document.getElementById('password').value;
    const errBox = document.getElementById('loginError');
    const errTxt = document.getElementById('loginErrorText');
    const sess = window.SIMAuth.login(email, pw);
    if (!sess) {
      errTxt.textContent = 'Email atau password salah.';
      errBox.style.display = 'flex';
      return;
    }
    if (sess.role !== 'admin') {
      errTxt.textContent = 'Akun ini bukan akun administrator. Gunakan portal UMKM.';
      errBox.style.display = 'flex';
      window.SIMAuth.logout();
      return;
    }
    location.href = 'dashboard.html';
  });
  if (window.ICRender) window.ICRender(document.body);
</script>
</body>
</html>
