<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logout</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card text-center">
    <div class="login-logo">UB</div>
    <h1>Keluar dari Sistem?</h1>
    <div class="sub">Pastikan semua data sudah tersimpan sebelum keluar.</div>
    <div class="flex gap-2" style="justify-content:center; margin-top:18px;">
      <a href="dashboard.html" class="btn secondary">Batal</a>
      <a href="login.html" class="btn danger" id="confirmLogout"><span data-ic="logout"></span> Ya, Logout</a>
    </div>
    <div class="footer-link">Sesi terakhir: 08 Jun 2026, 15:42</div>
  </div>
</div>
<script src="../icons.js"></script>
<script src="../auth.js"></script>
<script>
  document.getElementById('confirmLogout').addEventListener('click', () => {
    if (window.SIMAuth) window.SIMAuth.logout();
  });
</script>
</body>
</html>
