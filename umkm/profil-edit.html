<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edit Data UMKM</title>
<link rel="stylesheet" href="../style.css">
</head>
<body data-title="Edit Data UMKM">

<div class="alert">
  <span data-ic="shield" class="alert-ic"></span>
  <div>Data master usaha tersinkron dengan DKUKMPP. Perubahan akan dikirim untuk verifikasi.</div>
</div>

<div class="card">
  <div class="card-title mb-3">Form Edit Profil</div>
  <div class="form-grid cols-2">
    <div class="form-group">
      <label>Nama UMKM</label>
      <input class="form-control" name="nama_umkm" type="text" value="Kedai Sari Rasa">
    </div>
    <div class="form-group">
      <label>Nama Pemilik</label>
      <input class="form-control" name="pemilik" type="text" value="Sari Wahyuni">
    </div>
    <div class="form-group">
      <label>Kategori Usaha</label>
      <select class="form-control" name="kategori_usaha" id="kategoriUsaha">
        <option value="kuliner" selected>Kuliner</option>
        <option value="fashion">Fashion</option>
        <option value="kerajinan">Kerajinan</option>
        <option value="jasa">Jasa</option>
        <option value="pertanian">Pertanian / Perkebunan</option>
        <option value="perdagangan">Perdagangan</option>
        <option value="lainnya">Lainnya</option>
      </select>
    </div>
    <div class="form-group">
      <label>Sub Kategori Usaha</label>
      <select class="form-control" name="sub_kategori_usaha" id="subKategoriUsaha">
        <option>Warung Makan</option>
      </select>
    </div>
    <div class="form-group">
      <label>NIB (Nomor Induk Berusaha)</label>
      <input class="form-control" name="nib" type="text" value="1234567890123" inputmode="numeric" maxlength="13">
    </div>
    <div class="form-group">
      <label>Telepon</label>
      <input class="form-control" name="telepon" type="tel" value="081234567890">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input class="form-control" name="email" type="email" value="kedaisarirasa@gmail.com">
    </div>
    <div class="form-group">
      <label>Jumlah Karyawan</label>
      <input class="form-control" name="jumlah_karyawan" type="number" value="3" min="0">
    </div>
    <div class="form-group">
      <label>Modal Awal (Rp)</label>
      <input class="form-control" name="modal_awal" type="number" value="15000000" min="0">
    </div>
  </div>

  <div class="form-group mt-2">
    <label>Alamat Usaha</label>
    <textarea class="form-control" name="alamat" rows="2">Jl. Melati No. 12, Kel. Sukamaju, Bandung</textarea>
  </div>

  <div class="form-group">
    <label>Deskripsi Usaha</label>
    <textarea class="form-control" name="deskripsi" rows="3">Kedai makanan rumahan dengan menu nasi rames, soto, dan minuman tradisional.</textarea>
  </div>

  <div class="flex gap-2 justify-between mt-2" style="flex-wrap:wrap">
    <a href="profil.html" class="btn secondary">Batal</a>
    <a href="profil.html" class="btn success"><span data-ic="save"></span> Simpan Perubahan</a>
  </div>
</div>

<script src="../icons.js"></script>
<script src="../sidebar.js"></script>
<script>
  const subMap = {
    kuliner:    ['Warung Makan','Minuman','Snack','Catering','Bakery'],
    fashion:    ['Baju','Celana','Hijab','Sepatu','Aksesoris'],
    kerajinan:  ['Anyaman','Kayu','Keramik','Tekstil'],
    jasa:       ['Laundry','Servis','Salon','Pendidikan'],
    pertanian:  ['Sayuran','Buah','Ternak','Perikanan'],
    perdagangan:['Sembako','Elektronik','Toko Kelontong'],
    lainnya:    ['Lainnya'],
  };
  const kat = document.getElementById('kategoriUsaha');
  const sub = document.getElementById('subKategoriUsaha');
  function fillSub(){
    sub.innerHTML = (subMap[kat.value]||['-']).map(o=>`<option>${o}</option>`).join('');
  }
  kat.addEventListener('change', fillSub);
  fillSub();
</script>
</body>
</html>
