<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Detail Transaksi - UMKM</title>
<link rel="stylesheet" href="../style.css">
</head>
<body data-title="Detail Transaksi" data-back="riwayat-pengeluaran.html">

<div class="m-detail-head">
  <div class="lbl">Pengeluaran</div>
  <div class="val">- Rp 850.000</div>
  <div class="sub">Belanja Bahan Baku</div>
</div>

<div class="m-card">
  <div class="m-info-row">
    <div class="ic"><span data-ic="tag"></span></div>
    <div style="flex:1">
      <div class="lbl">Nama Transaksi</div>
      <div class="val">Belanja Bahan Baku</div>
    </div>
  </div>
  <div class="m-info-row">
    <div class="ic"><span data-ic="wallet"></span></div>
    <div style="flex:1">
      <div class="lbl">Nominal</div>
      <div class="val">Rp 850.000</div>
    </div>
  </div>
  <div class="m-info-row">
    <div class="ic"><span data-ic="food"></span></div>
    <div style="flex:1">
      <div class="lbl">Kategori</div>
      <div class="val">Bahan Baku</div>
    </div>
  </div>
  <div class="m-info-row">
    <div class="ic"><span data-ic="calendar"></span></div>
    <div style="flex:1">
      <div class="lbl">Tanggal</div>
      <div class="val">07 Juni 2026</div>
    </div>
  </div>
  <div class="m-info-row">
    <div class="ic"><span data-ic="file-text"></span></div>
    <div style="flex:1">
      <div class="lbl">Keterangan</div>
      <div class="val">Belanja bahan baku mingguan: beras, minyak, telur, gula.</div>
    </div>
  </div>
</div>

<div class="m-btn-row">
  <a href="riwayat-pengeluaran.html" class="m-btn danger"><span data-ic="x"></span> Hapus</a>
  <a href="transaksi-edit.html" class="m-btn"><span data-ic="edit"></span> Edit</a>
</div>

<script src="../icons.js"></script>
<script src="../sidebar.js"></script>
</body>
</html>
